services:
  postgres:
    image: postgres:18.4-bookworm
    container_name: todoapp-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_PATH}/out/pgdata:/var/lib/postgresql
    restart: always